context.modules = [
    # 1. GAME SINK (Empfängt 7.1 vom Spiel)
    { name = libpipewire-module-loopback
      args = {
          node.description = "GameSink"
          capture.props = {
              node.name = "GameSink"
              media.class = "Audio/Sink"
              audio.channels = 8
              audio.position = [ FL FR FC LFE RL RR SL SR ]
          }
          playback.props = {
              node.name = "GameMixer"
              target.object = "SurroundInput"
          }
      }
    },

    # 2. CHAT SINK (Direkt Stereo zum Headset)
    { name = libpipewire-module-loopback
      args = {
          node.description = "ChatSink"
          capture.props = {
              node.name = "ChatSink"
              media.class = "Audio/Sink"
          }
          playback.props = {
              node.name = "ChatMixer"
              target.object = "HeadsetSink"
          }
      }
    },

    # 3. HEADSET SINK (Das Ziel für alles)
    { name = libpipewire-module-loopback
      args = {
          node.description = "HeadsetSink"
          capture.props = {
              node.name = "HeadsetSink"
              media.class = "Audio/Sink"
          }
          playback.props = {
              node.name = "HeadsetMaster"
              target.object = "alsa_output.usb-Turtle_Beach_Corp_Atlas_Air_0000000000000001-00.analog-stereo"
          }
      }
    }
]
