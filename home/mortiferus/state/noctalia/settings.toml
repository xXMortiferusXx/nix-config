config_version = 2

[bar.default]
background_opacity = 0.60999998636543751
capsule = true
capsule_opacity = 0.74999998323619366
capsule_thickness = 0.79999998584389687
end = [
    "media",
    "tray",
    "nix-monitor",
    "notifications",
    "clipboard",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "control-center",
    "session"
]
start = [ "launcher", "wallpaper", "workspaces", "active_window" ]

[calendar]
enabled = true

    [calendar.account.personal_google]
    type = "google"

[dock]
background_opacity = 0.79999998211860657
enabled = true
icon_size = 36
margin_edge = 0
reserve_space = false
smart_auto_hide = true

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = true
    timeout = 900

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660

[location]
address = "Barsinghausen"
auto_locate = true

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1", "lockscreen-widget-0000000000000001", "lockscreen-widget-0000000000000002" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 976.0
    cy = 1007.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 240.0
    box_width = 800.0
    cx = 976.0
    cy = 124.0
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000001.settings]
        background_opacity = 0.59999999999999998
        center_text = true
        clock_style = "digital"
        color = "primary"
        font_family = "Courier New"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000002]
    box_height = 160.0
    box_width = 464.0
    cx = 976.0
    cy = 844.0
    output = "eDP-1"
    rotation = 0.0
    type = "weather"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000002.settings]
        background_opacity = 0.59999999999999998
        color = "primary"
        font_family = "Comic Sans MS"
        show_forecast = true

[plugins]
enabled = [ "avivbintangaringga/nix-monitor" ]

    [[plugins.source]]
    auto_update = true
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

    [[plugins.source]]
    auto_update = true
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

[shell]
avatar_path = "/home/mortiferus/Bilder/Linux-Profil.png"
launch_apps_as_systemd_services = true
password_style = "random"
polkit_agent = true
settings_show_advanced = true
telemetry_enabled = true

    [shell.greeter_sync]
    auto_sync = true
    privilege_command = "pkexec"

[theme]
mode = "light"
source = "wallpaper"

[wallpaper]
directory = "/home/mortiferus/Bilder/Wallpaper-NSFW"
transition_on_startup = true

    [wallpaper.automation]
    enabled = true
    order = "alphabetical"

    [wallpaper.default]
    path = "/home/mortiferus/Bilder/Wallpaper-NSFW/wallhaven-ex15ww_1920x1080.png"

    [wallpaper.last]
    path = "/home/mortiferus/Bilder/Wallpaper-NSFW/wallhaven-ex15ww_1920x1080.png"

    [wallpaper.monitors.eDP-1]
    path = "/home/mortiferus/Bilder/Wallpaper-NSFW/wallhaven-ex15ww_1920x1080.png"

[widget.battery]
show_label = false

[widget.brightness]
show_label = false

[widget.clock]
format = "{:%H:%M} -- {:%d.%m.%y}"

[widget.network]
show_label = false

[widget.nix-monitor]
show_text = false
type = "avivbintangaringga/nix-monitor:nix-monitor"

[widget.volume]
show_label = false